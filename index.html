<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;background:#F8FAFC;color:#333;font-size:14px;-webkit-font-smoothing:antialiased;}
:root{--primary:#1B3A5C;--accent:#2E86AB;--light-bg:#F0F5FA;--body-c:#22A06B;--cog-c:#2E86AB;--work-c:#6B5CE7;--recov-c:#0E9AA7;--red:#CF4B37;--orange:#E97F33;--yellow:#D4A843;--green:#22A06B;--gray:#6B7280;--light-gray:#E5E7EB;--radius:12px;}

/* Layout */
.container{max-width:960px;margin:0 auto;padding:0 24px;}
nav{background:var(--primary);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 24px;}
.nav-brand{font-size:18px;font-weight:700;letter-spacing:1px;margin-right:auto;}
.nav-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;background:transparent;color:#fff;border:none;cursor:pointer;transition:.2s;}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.2);}
footer{text-align:center;padding:16px;font-size:11px;color:#aaa;border-top:1px solid #eee;margin-top:32px;}

/* Responsive */
@media(max-width:640px){
  .container{max-width:100%;padding:0 12px;}
  .nav-inner{padding:0 12px;}
  .nav-brand{font-size:16px;}
  .nav-btn{padding:6px 10px;font-size:12px;}
  .grid2-resp{grid-template-columns:1fr !important;}
  .grid3-resp{grid-template-columns:1fr !important;}
}
@media(min-width:641px){
  .diag-center{max-width:560px;margin:0 auto;}
}

/* Card */
.card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f0f0f0;padding:16px;margin-bottom:12px;}
.card-accent{border-left:4px solid var(--accent);}

/* Badge */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;}

/* Tabs */
.tabs{display:flex;border-bottom:2px solid #eee;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch;}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;}
.tab:hover{color:var(--primary);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* Score bar */
.bar-bg{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;flex:1;}
.bar-fill{height:100%;border-radius:5px;transition:width .8s ease-out;width:0;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{min-width:36px;text-align:right;font-size:13px;font-weight:600;}

/* Button */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(46,134,171,.25);}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
.btn-outline:hover{background:var(--primary);color:#fff;}
.btn-full{width:100%;}

/* Options (radio buttons) */
.opt-btn{width:100%;text-align:left;padding:14px 16px;border-radius:var(--radius);border:2px solid #e5e7eb;background:#fff;font-size:13px;cursor:pointer;transition:.2s;margin-bottom:8px;color:#555;}
.opt-btn:hover{border-color:var(--accent);}
.opt-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(min-width:641px){.grid-wide{grid-template-columns:repeat(4,1fr);}}

/* Section title */
.sec-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:4px;}
.sec-sub{font-size:12px;color:var(--gray);margin-bottom:12px;}

/* Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn .4s ease-out;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:64px;height:64px;border:4px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;}

/* Progress */
.progress-bg{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:8px 4px;font-weight:600;color:var(--gray);border-bottom:2px solid #e5e7eb;text-align:center;}
.tbl td{padding:8px 4px;border-bottom:1px solid #f0f0f0;text-align:center;}
.tbl td:first-child{text-align:left;font-weight:500;}
.cell-score{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px;}

/* Accordion */
.accord-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.accord-body{margin-top:16px;padding-top:16px;border-top:1px solid #eee;display:none;}
.accord-body.open{display:block;}

/* Alert card */
.alert-danger{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;}
.alert-info{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;}

/* Misc */
.text-center{text-align:center;}
.text-xs{font-size:11px;}
.text-sm{font-size:13px;}
.mt-2{margin-top:8px;}
.mt-4{margin-top:16px;}
.mb-2{margin-bottom:8px;}
.mb-4{margin-bottom:16px;}
.gap-2{gap:8px;}
.flex{display:flex;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.flex-1{flex:1;}
canvas{max-width:100%;}
</style>
</head>

const $ = id => document.getElementById(id);
const app = () => $('app');
const h = (tag,attrs,children) => {let e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});if(children!=null){if(Array.isArray(children))children.forEach(c=>{if(typeof c==='string')e.appendChild(document.createTextNode(c));else if(c)e.appendChild(c);});else if(typeof children==='string')e.textContent=children;else e.appendChild(children);}return e;};

function scoreColor(s){return s>=70?'#22A06B':s>=60?'#2E86AB':s>=50?'#D4A843':'#CF4B37';}
function cellBg(v){return v>=70?'#DCFCE7':v>=60?'#FEF9C3':v>=50?'#FED7AA':'#FECACA';}
function cellTxt(v){return v>=70?'#166534':v>=60?'#854D0E':v>=50?'#9A3412':'#991B1B';}
function priColor(p){return p==='最優先'?'#CF4B37':p==='推奨'||p==='高'?'#E97F33':'#D4A843';}

function badge(text,bg){return `<span class="badge" style="background:${bg}">${text}</span>`;}
function barHTML(score,color,delay){
  return `<div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="background:${color}" data-w="${score}"></div></div><span class="bar-label" style="color:${color}">${score}</span></div>`;
}

function animateBars(el){
  if(!el)el=document;
  setTimeout(()=>{el.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';});},50);
}

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['diagnosis','individual','corporate'][i]===page);
  });
  render();
}

function render(){
  destroyCharts();
  if(currentPage==='diagnosis') renderDiagnosis();
  else if(currentPage==='individual') renderIndividual();
  else renderCorporate();
}

let demoData = {gender:null, age:null, email:''};

function selectDemo(type, val){
  demoData[type] = val;
  document.querySelectorAll('.demo-'+type).forEach(b=>{
    b.classList.toggle('selected', b.textContent.trim()===val);
  });
  checkDemoReady();
}

function checkDemoReady(){
  const emailEl = $('demo-email');
  if(emailEl) demoData.email = emailEl.value.trim();
  const btn = $('start-btn');
  if(btn) btn.disabled = !(demoData.gender && demoData.age && demoData.email && demoData.email.includes('@'));
}

function startDiag(){
  diagState.phase='question'; diagState.qi=0; diagState.answers={};
  render();
}

function renderDiagQuestion(){
  const q = QUESTIONS[diagState.qi];
  const total = QUESTIONS.length;
  const idx = diagState.qi;
  const ans = diagState.answers[idx];
  const ax = AXES.find(a=>a.key===q.axis);

  app().innerHTML = `
  <div class="fade diag-center" style="padding-top:8px;">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs" style="color:var(--gray);">質問 ${idx+1} / ${total}</span>
      <span class="text-xs" style="background:${ax.color}20;color:${ax.color};padding:2px 8px;border-radius:10px;">${q.genre}</span>
    </div>
    <div class="progress-bg mb-4"><div class="progress-fill" style="width:${(idx+1)/total*100}%"></div></div>

    <div class="card mb-4">
      <div class="flex gap-2" style="gap:12px;">
        <span style="font-size:24px;margin-top:2px;">${ax.icon}</span>
        <p style="font-weight:500;line-height:1.6;">${q.q}</p>
      </div>
    </div>

    <div class="mb-4">
      ${q.opts.map((o,i)=>`<button class="opt-btn ${ans===i+1?'selected':''}" onclick="selectAnswer(${i+1})">${o}</button>`).join('')}
    </div>

    <div class="flex gap-2" style="gap:12px;">
      ${idx>0?`<button class="btn btn-outline flex-1" onclick="prevQ()">← 戻る</button>`:''}
      <button class="btn btn-primary flex-1" ${!ans?'disabled':''} onclick="nextQ()">
        ${idx===total-1?'診断完了 →':'次へ →'}
      </button>
    </div>
  </div>`;
}

function selectAnswer(v){
  diagState.answers[diagState.qi]=v;
  renderDiagQuestion();
}
function prevQ(){diagState.qi--;render();}
function nextQ(){
  if(!diagState.answers[diagState.qi])return;
  if(diagState.qi<QUESTIONS.length-1){diagState.qi++;render();}
  else{diagState.phase='analyzing';render();}
}

function renderDiagAnalyzing(){
  let progress=0;
  const steps=["回答データを集計中...","4軸スコアを算出中...","SPSタイプを判定中...","レポートを生成中..."];

  app().innerHTML = `
  <div class="fade diag-center text-center" style="padding-top:64px;">
    <div class="spinner"></div>
    <h2 style="font-size:18px;font-weight:700;color:var(--primary);margin-bottom:8px;">分析中</h2>
    <p id="step-text" class="text-sm" style="color:var(--gray);margin-bottom:24px;">${steps[0]}</p>
    <div class="progress-bg" style="max-width:240px;margin:0 auto;">
      <div id="analysis-bar" class="progress-fill" style="width:0%"></div>
    </div>
    <p id="pct-text" class="text-xs" style="color:#aaa;margin-top:8px;">0%</p>
  </div>`;

  const iv = setInterval(()=>{
    progress+=2;
    const bar=$('analysis-bar');
    const stepEl=$('step-text');
    const pctEl=$('pct-text');
    if(bar)bar.style.width=progress+'%';
    if(stepEl)stepEl.textContent=steps[Math.min(Math.floor(progress/25),3)];
    if(pctEl)pctEl.textContent=progress+'%';
    if(progress>=100){
      clearInterval(iv);
      setTimeout(()=>{navigate('individual');},500);
    }
  },60);
}

function drawScoreArc(id,score,size){
  const canvas=$(id); if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const r=(size-20)/2;
  const cx=size/2, cy=size/2;
  const startA=Math.PI*0.75, endA=Math.PI*2.25;
  const scoreA=startA+(endA-startA)*(score/100);
  const sc=score>=65?'#22A06B':score>=50?'#D4A843':'#CF4B37';

  // Background arc
  ctx.beginPath();ctx.arc(cx,cy,r,startA,endA);ctx.strokeStyle='#E5E7EB';ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
  // Score arc
  ctx.beginPath();ctx.arc(cx,cy,r,startA,scoreA);ctx.strokeStyle=sc;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
  // Text
  ctx.fillStyle=sc;ctx.font='bold 28px "Noto Sans JP"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(score,cx,cy-2);
  ctx.fillStyle='#aaa';ctx.font='11px "Noto Sans JP"';ctx.fillText('/100',cx,cy+18);
}

function drawRadar(id,labels,data,colors){
  const ctx=$(id); if(!ctx)return;
  const ch=new Chart(ctx,{type:'radar',data:{labels,datasets:[{data,backgroundColor:'rgba(46,134,171,.15)',borderColor:'#2E86AB',borderWidth:2,pointBackgroundColor:colors,pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5}]},options:{responsive:true,maintainAspectRatio:true,scales:{r:{min:0,max:100,ticks:{stepSize:20,display:true,font:{size:10},backdropColor:'transparent'},pointLabels:{font:{size:13,weight:'600'},color:colors},grid:{color:'#E5E7EB'},angleLines:{color:'#E5E7EB'}}},plugins:{legend:{display:false}}}});
  charts.push(ch);
}

function drawDoughnut(id,hi,lo,color){
  const ctx=$(id); if(!ctx)return;
  const ch=new Chart(ctx,{type:'doughnut',data:{labels:['High','Low'],datasets:[{data:[hi,lo],backgroundColor:[color,'#E5E7EB'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,cutout:'70%',plugins:{legend:{display:false}}}});
  charts.push(ch);
}
